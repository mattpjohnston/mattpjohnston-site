name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build site
        working-directory: apps/web
        env:
          PUBLIC_COUNTER_API_URL: ${{ vars.PUBLIC_COUNTER_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync apps/web/dist/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync HTML to S3 (revalidate)
        run: |
          aws s3 sync apps/web/dist/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
